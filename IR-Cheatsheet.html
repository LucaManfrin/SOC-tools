<!doctype html>
<html lang="it" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IR-Cheatsheet</title>
<style>
  :root{
    --bg:#0a0d0f;
    --bg-panel:#12171a;
    --bg-panel-alt:#161c1f;
    --border:#212a2d;
    --text:#dfe8ea;
    --text-dim:#9aa8ab;
    --text-faint:#5c6b6e;
    --code-bg:#0d1113;
    --danger:#ff6b6b;
    --ok:#39d98a;
    --win-accent:#4da6ff;
    --lin-accent:#f2b134;
    --dfir-accent:#c084fc;
    --parsing-accent:#2dd4bf;
    --placeholder:#ff9d3f;
    --accent:#4da6ff;
    --font-mono: ui-monospace, "Cascadia Code", "SF Mono", Consolas, "Roboto Mono", monospace;
    --font-sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --radius: 6px;
  }
  html[data-theme="light"]{
    --bg:#f3f6f5;
    --bg-panel:#ffffff;
    --bg-panel-alt:#eef2f1;
    --border:#dde3e1;
    --text:#10161a;
    --text-dim:#4d5b5e;
    --text-faint:#7c8b8e;
    --code-bg:#eef2f1;
    --win-accent:#1f6fd6;
    --lin-accent:#a1720a;
    --dfir-accent:#8b3fd1;
    --parsing-accent:#0f9488;
    --placeholder:#b45309;
  }
  html[data-area="windows"]{ --accent: var(--win-accent); }
  html[data-area="linux"]{ --accent: var(--lin-accent); }
  html[data-area="dfir"]{ --accent: var(--dfir-accent); }
  html[data-area="parsing"]{ --accent: var(--parsing-accent); }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; overflow-x:hidden; max-width:100vw;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-sans);
    min-height:100vh;
  }
  ::selection{ background:var(--accent); color:#0a0d0f; }
  button{font-family:inherit;}
  a{color:var(--accent);}

  .cursor{
    display:inline-block;
    width:.5em;
    color:var(--accent);
    animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{ 50%{opacity:0;} }
  @media (prefers-reduced-motion: reduce){
    .cursor{animation:none;}
  }

  /* ---------- Overlay di scelta area ---------- */
  .overlay{
    position:fixed; inset:0; z-index:999;
    background:
      radial-gradient(circle at 20% 20%, rgba(77,166,255,.06), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(192,132,252,.06), transparent 40%),
      var(--bg);
    display:flex; align-items:center; justify-content:center;
    transition:opacity .25s ease;
  }
  .overlay.hidden{ opacity:0; pointer-events:none; }
  .overlay-inner{ text-align:center; max-width:640px; padding:32px; }
  .boot-line{
    font-family:var(--font-mono); font-size:13px; color:var(--text-faint);
    margin-bottom:18px; letter-spacing:.02em;
  }
  .overlay-inner h1{
    font-family:var(--font-mono); font-weight:600; font-size:clamp(28px,5vw,42px);
    margin:0 0 10px; letter-spacing:-.01em;
  }
  .overlay-sub{ color:var(--text-dim); margin:0 0 30px; font-size:15px; }
  .area-choice{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
  .area-btn{
    font-family:var(--font-mono); font-size:15px; font-weight:600;
    padding:16px 28px; border-radius:var(--radius); cursor:pointer;
    background:var(--bg-panel); color:var(--text); border:1px solid var(--border);
    min-width:150px; transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease;
  }
  .area-btn:hover{ transform:translateY(-2px); }
  .area-btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .area-btn.win:hover{ border-color:var(--win-accent); box-shadow:0 0 0 1px var(--win-accent) inset; }
  .area-btn.lin:hover{ border-color:var(--lin-accent); box-shadow:0 0 0 1px var(--lin-accent) inset; }
  .area-btn.dfir:hover{ border-color:var(--dfir-accent); box-shadow:0 0 0 1px var(--dfir-accent) inset; }
  .area-btn .sub{ display:block; font-family:var(--font-sans); font-weight:400; font-size:11.5px; color:var(--text-faint); margin-top:4px; }

  /* ---------- Header ---------- */
  .topbar{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; padding:12px 20px;
    background:var(--bg-panel); border-bottom:1px solid var(--border);
  }
  .brand{ display:flex; align-items:baseline; gap:14px; min-width:0; }
  .brand-title{ font-family:var(--font-mono); font-weight:700; font-size:19px; white-space:nowrap; }
  .brand-path{
    font-family:var(--font-mono); font-size:12.5px; color:var(--text-faint);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .topbar-actions{ display:flex; align-items:center; gap:10px; }

  .search-wrap{ position:relative; }
  #searchInput{
    width:280px; background:var(--bg-panel-alt); border:1px solid var(--border);
    color:var(--text); border-radius:var(--radius); padding:9px 12px 9px 32px;
    font-family:var(--font-mono); font-size:13px;
  }
  #searchInput:focus{ outline:2px solid var(--accent); outline-offset:1px; }
  .search-wrap::before{
    content:"⌕"; position:absolute; left:10px; top:50%; transform:translateY(-50%);
    color:var(--text-faint); font-size:16px; pointer-events:none;
  }
  .search-results{
    position:absolute; top:calc(100% + 6px); right:0; width:420px; max-height:420px;
    overflow-y:auto; background:var(--bg-panel); border:1px solid var(--border);
    border-radius:var(--radius); box-shadow:0 12px 28px rgba(0,0,0,.35); z-index:60;
  }
  .search-results.hidden{ display:none; }
  .sr-empty{ padding:16px; color:var(--text-faint); font-size:13px; text-align:center; }
  .sr-item{
    display:block; width:100%; text-align:left; background:none; border:none;
    border-bottom:1px solid var(--border); color:var(--text); padding:10px 14px; cursor:pointer;
  }
  .sr-item:last-child{ border-bottom:none; }
  .sr-item:hover, .sr-item:focus-visible{ background:var(--bg-panel-alt); }
  .sr-item .sr-title{ font-size:13.5px; font-weight:600; }
  .sr-item .sr-meta{ font-family:var(--font-mono); font-size:11px; color:var(--text-faint); margin-top:3px; }
  .sr-item .sr-meta .tag{ color:var(--accent); }

  .icon-btn{
    background:var(--bg-panel-alt); border:1px solid var(--border); color:var(--text);
    width:36px; height:36px; border-radius:var(--radius); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .icon-btn:hover{ border-color:var(--accent); }
  .icon-btn:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; }

  /* ---------- Area tabs & category tabs ---------- */
  .area-tabs{
    display:flex; gap:8px; padding:10px 20px; background:var(--bg);
    border-bottom:1px solid var(--border); flex-wrap:wrap;
  }
  .area-tab{
    font-family:var(--font-mono); font-size:12.5px; font-weight:600;
    padding:7px 14px; border-radius:999px; cursor:pointer;
    background:var(--bg-panel); border:1px solid var(--border); color:var(--text-dim);
  }
  .area-tab.active{ color:#0a0d0f; background:var(--accent); border-color:var(--accent); }
  .area-tab:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; }

  .category-tabs{
    display:flex; gap:8px; padding:12px 20px; background:var(--bg-panel);
    border-bottom:1px solid var(--border); flex-wrap:wrap; position:sticky; top:61px; z-index:40;
  }
  .cat-tab{
    font-size:12.5px; font-weight:600; padding:7px 13px; border-radius:var(--radius);
    cursor:pointer; background:var(--bg-panel-alt); border:1px solid var(--border); color:var(--text-dim);
  }
  .cat-tab.active{ color:var(--accent); border-color:var(--accent); background:var(--bg-panel); }
  .cat-tab:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; }

  /* ---------- Contenuto (allineato a sinistra) ---------- */
  main{ padding:24px 32px 90px; width:100%; margin:0; }
  .section{ margin-bottom:26px; scroll-margin-top:150px; }
  .section-head{
    display:flex; align-items:baseline; gap:10px; margin-bottom:9px;
    border-bottom:1px solid var(--border); padding-bottom:6px;
  }
  .section-head h2{ font-size:16px; margin:0; font-family:var(--font-mono); }
  .section-head .count{ font-size:11.5px; color:var(--text-faint); font-family:var(--font-mono); }

  .card{
    background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:9px 13px; margin-bottom:7px; transition:box-shadow .25s ease, border-color .25s ease;
    text-align:left;
  }
  .card.flash{ border-color:var(--accent); box-shadow:0 0 0 2px var(--accent); }
  .card-title{ font-size:12.5px; font-weight:600; line-height:1.35; white-space:normal; word-break:break-word; min-width:0; cursor:default; }
  .badge{
    font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:.03em;
    padding:2px 6px; border-radius:4px; text-transform:uppercase; white-space:nowrap;
  }
  .badge.PowerShell{ background:rgba(77,166,255,.15); color:#4da6ff; }
  .badge.CMD{ background:rgba(154,168,171,.18); color:#b7c3c5; }
  .badge.Bash{ background:rgba(242,177,52,.18); color:#f2b134; }
  .badge.rem{ background:rgba(255,107,107,.15); color:var(--danger); margin-left:6px; }

  .cmd-row{ display:flex; align-items:flex-start; gap:7px; min-width:0; }
  .copy-btn{
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:var(--bg-panel-alt); border:1px solid var(--border); color:var(--text-dim);
    width:22px; height:22px; padding:0; border-radius:4px; cursor:pointer; font-family:var(--font-mono);
    margin-top:1px;
  }
  .copy-btn .copy-icon{ font-size:13px; line-height:1; }
  .copy-btn .copy-label{ display:none; }
  .copy-btn:hover{ color:var(--text); border-color:var(--accent); }
  .copy-btn.copied{ color:var(--ok); border-color:var(--ok); }
  pre.code{
    flex:1; min-width:0; margin:0; background:var(--code-bg); border:1px solid var(--border);
    border-radius:4px; padding:6px 10px; overflow-x:visible;
    white-space:pre-wrap; word-break:break-all; overflow-wrap:anywhere;
    font-family:var(--font-mono); font-size:12px; line-height:1.4; color:var(--text);
  }

  /* ---------- Blocco Remediation ---------- */
  .rem-divider{
    display:flex; align-items:center; gap:8px; margin:10px 0 6px; padding-top:8px;
    border-top:1px dashed var(--border);
  }
  .rem-divider .rem-label{
    font-family:var(--font-mono); font-size:11px; font-weight:700; letter-spacing:.04em;
    text-transform:uppercase; color:var(--danger);
  }
  .card.rem-card{ border-left:3px solid var(--danger); }

  /* ---------- Layout a colonne: Teoria | Individuazione | Remediation ---------- */
  .section-cols{ display:grid; gap:14px; align-items:start; min-width:0; }
  .col-theory, .col-detect, .col-rem{ min-width:0; }
  .col-head{
    font-family:var(--font-mono); font-size:10.5px; font-weight:700; letter-spacing:.05em;
    text-transform:uppercase; color:var(--text-faint); margin-bottom:8px; padding-bottom:6px;
    border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px;
  }
  .col-head.theory{ color:var(--accent); }
  .col-head.detect{ color:var(--accent); }
  .col-head.rem{ color:var(--danger); }
  .col-detect .card, .col-rem .card{ margin-bottom:7px; }

  .theory-card{
    background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:11px 13px; font-size:12px; line-height:1.5;
  }
  .theory-path-row{ margin-bottom:7px; }
  .theory-path-row:last-child{ margin-bottom:0; }
  .theory-path{
    font-family:var(--font-mono); font-size:12px; color:var(--accent); font-weight:600;
    word-break:break-all;
  }
  .theory-desc{ color:var(--text-dim); font-size:11.5px; margin-top:1px; }
  .theory-note{
    margin-top:9px; padding-top:8px; border-top:1px dashed var(--border);
    font-size:11.5px; color:var(--text-dim); line-height:1.5;
  }
  .theory-note:first-child{ margin-top:0; padding-top:0; border-top:none; }
  .theory-note b{ color:var(--danger); }
  .theory-note.warn{ color:var(--placeholder); }
  .theory-note code{ font-family:var(--font-mono); font-size:11px; background:var(--code-bg); padding:1px 4px; border-radius:3px; }

  @media (max-width:1100px){
    .section-cols{ grid-template-columns:1fr !important; }
  }

  .wip{
    text-align:left; padding:70px 0; color:var(--text-dim);
  }
  .wip .wip-icon{ font-size:38px; margin-bottom:14px; }
  .wip h2{ font-family:var(--font-mono); margin:0 0 8px; }

  .placeholder{ color:var(--placeholder); font-weight:700; }

  /* ---------- Parsing view ---------- */
  .parsing-view{ max-width:100%; }
  .upload-box{
    display:flex; flex-direction:column; gap:6px; align-items:flex-start;
    border:1px dashed var(--border); border-radius:var(--radius); padding:22px 20px;
    cursor:pointer; background:var(--bg-panel); margin-bottom:16px; max-width:680px;
  }
  .upload-box:hover{ border-color:var(--accent); }
  .upload-box .upload-title{ font-weight:700; font-size:14px; }
  .upload-box .upload-hint{ font-size:12px; color:var(--text-faint); line-height:1.55; }
  .parsing-file-info{
    font-family:var(--font-mono); font-size:12px; color:var(--text-dim);
    margin-bottom:16px; padding:8px 12px; background:var(--bg-panel-alt);
    border:1px solid var(--border); border-radius:var(--radius); display:inline-block;
  }
  .parsing-file-info.hidden{ display:none; }
  .parsing-file-info .tag-known{ color:var(--accent); font-weight:700; }
  .table-toolbar{ display:flex; align-items:center; gap:12px; margin-bottom:10px; flex-wrap:wrap; }
  .table-filter, .txt-filter{
    flex:1; max-width:360px; background:var(--bg-panel-alt); border:1px solid var(--border);
    color:var(--text); border-radius:var(--radius); padding:8px 10px; font-family:var(--font-mono); font-size:13px;
  }
  .table-filter:focus, .txt-filter:focus{ outline:2px solid var(--accent); outline-offset:1px; }
  .table-count{ font-family:var(--font-mono); font-size:12px; color:var(--text-faint); white-space:nowrap; }
  .table-scroll{ max-height:65vh; overflow:auto; border:1px solid var(--border); border-radius:var(--radius); }
  table.data-table{ width:100%; border-collapse:collapse; font-size:12.5px; }
  table.data-table th, table.data-table td{
    text-align:left; padding:7px 10px; border-bottom:1px solid var(--border); white-space:nowrap;
    max-width:320px; overflow:hidden; text-overflow:ellipsis;
  }
  table.data-table th{
    position:sticky; top:0; background:var(--bg-panel-alt); cursor:pointer; user-select:none;
    font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim); z-index:1;
  }
  table.data-table th:hover{ color:var(--accent); }
  table.data-table tbody tr:hover{ background:var(--bg-panel-alt); }
  .txt-viewer{
    max-height:65vh; overflow:auto; background:var(--code-bg); border:1px solid var(--border);
    border-radius:var(--radius); padding:12px 14px; font-family:var(--font-mono); font-size:12.5px; line-height:1.6;
    margin:0; white-space:pre-wrap; word-break:break-all;
  }
  .txt-viewer mark{ background:var(--accent); color:#0a0d0f; border-radius:2px; padding:0 1px; }

  /* ---------- Checklist esecuzione + output ---------- */
  .card-head{ display:flex; align-items:flex-start; gap:7px; margin-bottom:6px; flex-wrap:nowrap; }
  .card-head .card-title{ margin:0; flex:1; }
  .card-head .badge{ flex-shrink:0; }
  .exec-label{ display:flex; align-items:center; padding-top:1px; cursor:pointer; }
  .exec-check{ width:15px; height:15px; accent-color:var(--accent); cursor:pointer; }
  .card.done{ border-color:var(--ok); }
  .card.done .card-title{ color:var(--text-dim); }

  textarea.output-box{
    flex:0 0 64px; min-width:0; height:26px; resize:none; overflow:hidden;
    background:var(--bg-panel-alt); border:1px solid var(--border); color:var(--text);
    border-radius:4px; padding:5px 8px; font-family:var(--font-mono); font-size:11.5px; line-height:1.4;
    transition:flex-basis .15s ease, height .15s ease; cursor:text;
  }
  textarea.output-box:focus, textarea.output-box:not(:placeholder-shown){
    flex:1 1 240px; height:64px; overflow:auto; resize:vertical; cursor:auto;
  }
  textarea.output-box:focus{ outline:2px solid var(--accent); outline-offset:1px; }
  textarea.output-box::placeholder{ color:var(--text-faint); }

  /* ---------- Torna in cima ---------- */
  .back-to-top{
    position:fixed; bottom:24px; right:24px; z-index:80;
    width:44px; height:44px; border-radius:50%;
    background:var(--accent); color:#0a0d0f; border:none; cursor:pointer;
    font-size:19px; box-shadow:0 6px 18px rgba(0,0,0,.35);
    opacity:0; pointer-events:none; transform:translateY(10px);
    transition:opacity .2s ease, transform .2s ease;
  }
  .back-to-top.visible{ opacity:1; pointer-events:auto; transform:translateY(0); }
  .back-to-top:focus-visible{ outline:2px solid var(--text); outline-offset:2px; }

  /* ---------- Report di stampa ---------- */
  #printReport{ display:none; }
  #printReport h1{ font-family:var(--font-mono); font-size:20px; margin:0 0 4px; color:#000; }
  #printReport .report-meta{ font-size:12px; color:#444; margin-bottom:20px; }
  #printReport .report-item{ margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid #ccc; page-break-inside:avoid; }
  #printReport .report-item-head{ font-family:var(--font-mono); font-size:10.5px; color:#555; text-transform:uppercase; letter-spacing:.03em; margin-bottom:4px; }
  #printReport .report-title{ font-weight:700; font-size:13px; margin-bottom:6px; color:#000; }
  #printReport .report-cmd{ background:#f1f1f1; border:1px solid #ccc; border-radius:4px; padding:8px 10px; font-family:var(--font-mono); font-size:11.5px; white-space:pre-wrap; word-break:break-word; color:#000; margin:0 0 8px; }
  #printReport .report-output-label{ font-size:11px; font-weight:700; color:#555; margin-bottom:3px; }
  #printReport .report-output{ background:#fafafa; border:1px dashed #ccc; border-radius:4px; padding:8px 10px; font-family:var(--font-mono); font-size:11.5px; white-space:pre-wrap; word-break:break-word; color:#111; margin:0; min-height:20px; }
  #printReport .report-empty{ padding:40px; text-align:center; color:#555; }

  @media print{
    body{ background:#fff !important; color:#000 !important; }
    body > *:not(#printReport){ display:none !important; }
    #printReport{ display:block !important; }
  }

  @media (max-width:720px){
    .topbar{ flex-wrap:wrap; }
    #searchInput{ width:200px; }
    .search-results{ width:min(90vw,420px); right:0; }
    .brand-path{ display:none; }
    main{ padding:20px 16px 80px; }
    .cmd-row{ flex-direction:column; }
    .copy-btn{ align-self:flex-start; }
    textarea.output-box{ width:100%; flex-basis:auto; }
    .back-to-top{ bottom:16px; right:16px; width:40px; height:40px; }
  }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="overlay-inner">
    <div class="boot-line">root@triage:~$ ./select-environment.sh</div>
    <h1>IR-Cheatsheet<span class="cursor">_</span></h1>
    <p class="overlay-sub">Seleziona l'ambiente da analizzare per iniziare il triage</p>
    <div class="area-choice">
      <button class="area-btn win" data-area="windows">Windows<span class="sub">host triage</span></button>
      <button class="area-btn lin" data-area="linux">Linux<span class="sub">host triage</span></button>
      <button class="area-btn dfir" data-area="dfir">DFIR<span class="sub">work in progress</span></button>
    </div>
  </div>
</div>

<header class="topbar">
  <div class="brand">
    <span class="brand-title">IR-Cheatsheet<span class="cursor">_</span></span>
    <span class="brand-path" id="breadcrumb">root@triage:~#</span>
  </div>
  <div class="topbar-actions">
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Cerca comandi... (min 3 caratteri)" autocomplete="off">
      <div class="search-results hidden" id="searchResults"></div>
    </div>
    <button class="icon-btn" id="reportBtn" title="Genera report dei comandi eseguiti" aria-label="Report">🖨</button>
    <button class="icon-btn" id="themeToggle" title="Cambia tema" aria-label="Cambia tema">◐</button>
  </div>
</header>

<nav class="area-tabs" id="areaTabs">
  <button class="area-tab" data-area="windows">Windows</button>
  <button class="area-tab" data-area="linux">Linux</button>
  <button class="area-tab" data-area="dfir">DFIR</button>
  <button class="area-tab" data-area="parsing">📄 Parsing</button>
</nav>

<nav class="category-tabs" id="categoryTabs"></nav>

<main id="content"></main>

<button id="backToTop" class="back-to-top" title="Torna in cima" aria-label="Torna in cima">↑</button>

<div id="printReport"></div>

<script>
/* =========================================================
   DATASET COMANDI

  { id:'suspdir', name:'Suspicious Directory', theory:{
    paths:[
      {p:"C:\\Users\\*\\AppData\\Local\\Temp", d:"cartella Temp utente — location comune per il download iniziale"},
      {p:"C:\\Windows\\Temp", d:"scrivibile da tutti gli utenti, spesso usata per staging con privilegi elevati"},
      {p:"C:\\ProgramData", d:"cartella legittima ma poco monitorata"},
      {p:"C:\\Users\\Public, C:\\PerfLogs, C:\\Windows\\Tasks", d:"cartelle scrivibili da chiunque e generalmente poco monitorate"},
    ],
    notes:[
      {warn:true, text:"attrib +h +s +r <file> è la tecnica usata da un attaccante per nascondere un file (attributi Hidden/System/ReadOnly): utile da conoscere per interpretare correttamente i risultati di dir /A:H, non da eseguire durante l'analisi."},
    ],
  }, items:[
    {t:"Eseguibili e script presenti nelle cartelle Temp di tutti gli utenti: una delle location più comuni per il download e la prima esecuzione di malware.", y:"PowerShell", c:`Get-ChildItem "C:\\Users\\*\\AppData\\Local\\Temp" -Recurse -File -ErrorAction SilentlyContinue | Where-Object { $_.Extension -in ".exe",".ps1",".bat",".vbs" }`},
    {t:"Contenuto di C:\\Windows\\Temp: cartella scrivibile da tutti gli utenti e spesso usata per lo staging di payload da parte di processi con privilegi elevati.", y:"PowerShell", c:`Get-ChildItem "C:\\Windows\\Temp" -Recurse -File -ErrorAction SilentlyContinue`},
    {t:"Contenuto della cartella Temp corrente e di quella di sistema, ordinato per data, da riga di comando.", y:"CMD", c:`dir %TEMP% /O:D\ndir C:\\Windows\\Temp /O:D`},
    {t:"Binari sospetti in ProgramData: cartella legittima ma poco monitorata, spesso scelta per nascondere payload tra i dati di applicazioni reali.", y:"PowerShell", c:`Get-ChildItem "C:\\ProgramData" -Recurse -File -ErrorAction SilentlyContinue | Where-Object { $_.Extension -in ".exe",".dll",".ps1" }`},
    {t:"Contenuto di cartelle scrivibili da qualunque utente e generalmente poco monitorate (Public, PerfLogs, Tasks): posizioni alternative spesso scelte per evadere controlli più superficiali.", y:"PowerShell", c:`Get-ChildItem "C:\\Users\\Public","C:\\PerfLogs","C:\\Windows\\Tasks" -Recurse -File -ErrorAction SilentlyContinue`},
    {t:"File nascosti su tutto il volume C: operazione onerosa in termini di tempo, da restringere a una cartella specifica quando possibile per evitare scan troppo lunghi.", y:"PowerShell", c:`Get-ChildItem "C:\\" -Recurse -Force -ErrorAction SilentlyContinue | Where-Object { $_.Attributes -match "Hidden" } | Select-Object FullName`},
    {t:"Stessa ricerca di file nascosti tramite il comando dir nativo, senza passare per PowerShell.", y:"CMD", c:`dir /A:H /S C:\\`},
    {t:"File .exe creati o modificati nelle ultime 24 ore in tutti i profili utente: individua rapidamente i binari più recenti senza dover ordinare manualmente decine di risultati.", y:"CMD", c:`forfiles /p C:\\Users /s /m *.exe /d +0 /c "cmd /c echo @path @fdate"`},
    {t:"File modificati a partire da una data specifica su tutto il volume C:, con timestamp completo di ora.", y:"CMD", c:`forfiles /P C:\\ /S /D +<data> /C "cmd /c echo @path @fdate @ftime"`},
    {t:"Eseguibili e script modificati nelle ultime 24 ore su tutti i profili utente: stessa logica del comando precedente ma con filtri più flessibili grazie a PowerShell.", y:"PowerShell", c:`Get-ChildItem -Recurse -Path "C:\\Users" -Include *.exe,*.ps1,*.vbs -ErrorAction SilentlyContinue | Where-Object { $_.LastWriteTime -gt (Get-Date).AddDays(-1) }`},
    {t:"Elenco completo dei file dell'intero volume C: con data di scrittura, ordinato per data: utile per una scansione ampia quando non si ha ancora un'ipotesi precisa sulla finestra temporale.", y:"CMD", c:`dir /T:W /O:D /S C:\\Users\\*.*`},
    {t:"Tutti i file modificati negli ultimi 7 giorni sull'intero disco: rete di sicurezza più ampia rispetto al controllo sulle sole 24 ore.", y:"PowerShell", c:`Get-ChildItem -Path C:\\ -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.LastWriteTime -gt (Get-Date).AddDays(-7) }`},
    {t:"Nuovi file comparsi in System32 negli ultimi 30 giorni: questa cartella cambia raramente, quindi un file recente è un forte indicatore di compromissione.", y:"PowerShell", c:`Get-ChildItem C:\\Windows\\System32 | Where-Object { $_.LastWriteTime -gt (Get-Date).AddDays(-30) }`},
    {t:"I 20 eseguibili modificati più di recente in System32: variante ordinata del controllo precedente, utile per concentrarsi sui casi più recenti.", y:"PowerShell", c:`Get-Item C:\\Windows\\System32\\*.exe | Sort-Object LastWriteTime -Descending | Select-Object -First 20`},
    {t:"EXE e DLL comparse nei profili utente negli ultimi 30 giorni: un binario in un profilo utente è quasi sempre meno legittimo di uno in Program Files.", y:"PowerShell", c:`Get-ChildItem -Path C:\\Users -Recurse -Include *.exe,*.dll -ErrorAction SilentlyContinue | Where-Object { $_.LastWriteTime -gt (Get-Date).AddDays(-30) }`},
    {t:"Permessi su un file o cartella sospetti: un ACL troppo permissivo (Everyone/Authenticated Users con controllo completo) può indicare manomissione o preparazione a un attacco.", y:"CMD", c:`icacls <percorso>`},
    {t:"Calcola l'hash SHA256 di un file specifico individuato come sospetto, da confrontare con IOC noti o da interrogare su VirusTotal.", y:"PowerShell", c:`Get-FileHash -Path "<percorso file>" -Algorithm SHA256`},
    {t:"Stessa operazione di hashing tramite certutil: alternativa nativa disponibile anche su versioni Windows meno recenti o quando i cmdlet PowerShell sono bloccati da policy.", y:"CMD", c:`certutil -hashfile "<percorso file>" SHA256`},
    {t:"Esporta l'elenco di file trovati nelle cartelle sospette (Temp, ProgramData) in CSV in C:\\Windows\\Temp con timestamp automatico: il file viene riconosciuto dal modulo Parsing di questa dashboard e mostrato come tabella filtrabile e ordinabile.", y:"PowerShell", c:`Get-ChildItem "C:\\Users\\*\\AppData\\Local\\Temp","C:\\Windows\\Temp","C:\\ProgramData" -Recurse -File -ErrorAction SilentlyContinue | Select-Object FullName,Length,LastWriteTime,Extension | Export-Csv -NoTypeInformation -Path "C:\\Windows\\Temp\\ircheatsheet_suspdir_$(Get-Date -Format 'yyyyMMdd_HHmmss').csv"`},
  ], remediation:[
    {t:"Metti in quarantena un file sospetto spostandolo in una cartella di evidence dedicata, senza cancellarlo.", y:"PowerShell", c:`New-Item -ItemType Directory -Path "C:\\Quarantine" -Force | Out-Null\nMove-Item -Path "<percorso-file>" -Destination "C:\\Quarantine\\" -Force`},
    {t:"Elimina definitivamente un file, da eseguire solo dopo aver completato la raccolta forense/hash.", y:"PowerShell", c:`Remove-Item -Path "<percorso-file>" -Force`},
  ]},
  { id:'eventlog', name:'Event Logs', theory:{
    paths:[
      {p:"Security", d:"logon/logoff, uso privilegi, gestione account"},
      {p:"System", d:"eventi di sistema, inclusa installazione servizi (7045)"},
      {p:"Microsoft-Windows-PowerShell/Operational", d:"Script Block Logging (4104)"},
      {p:"Microsoft-Windows-Sysmon/Operational", d:"telemetria granulare, se Sysmon è installato"},
    ],
    notes:[],
  }, items:[
    {t:"Eventi di logon riuscito, logon fallito, uso di privilegi speciali e creazione di nuovi utenti dal log Security: la prima query da lanciare sul log più importante per il triage (T1078).", y:"PowerShell", c:`Get-WinEvent -LogName Security -MaxEvents 200 | Where-Object { $_.Id -in 4624,4625,4672,4720 }`},
    {t:"Rileva la cancellazione dei log Security o System (Event ID 1102 e 104): uno degli indicatori di anti-forensics più significativi, quasi sempre successivo a un'attività malevola già conclusa.", y:"PowerShell", c:`Get-WinEvent -FilterHashtable @{LogName=@('Security','System'); Id=@(1102,104)} -ErrorAction SilentlyContinue`},
    {t:"Export rapido degli ultimi eventi del log Security in formato testo, utile quando serve un output leggibile senza aprire l'Event Viewer.", y:"CMD", c:`wevtutil qe Security /c:50 /rd:true /f:text`},
    {t:"Script Block Logging di PowerShell (Event ID 4104): rivela il contenuto reale degli script eseguiti, incluso codice offuscato decodificato al momento dell'esecuzione.", y:"PowerShell", c:`Get-WinEvent -FilterHashtable @{LogName='Microsoft-Windows-PowerShell/Operational';Id=4104} -MaxEvents 100`},
    {t:"Eventi Sysmon, se il sensore è installato sull'host: fornisce visibilità molto più granulare su processi, rete e file rispetto ai log nativi di Windows.", y:"PowerShell", c:`Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 200`},
    {t:"Installazione di nuovi servizi (Event ID 7045): tecnica di persistenza molto comune, spesso associata alla creazione di un servizio malevolo subito dopo il logon (T1543.003).", y:"PowerShell", c:`Get-WinEvent -FilterHashtable @{LogName='System';Id=7045}`},
    {t:"Eventi di creazione processo con command line completa (Event ID 4688): richiede che l'auditing avanzato sia abilitato, ma se presente è una delle migliori fonti di dati disponibili nativamente.", y:"PowerShell", c:`Get-WinEvent -FilterHashtable @{LogName='Security';Id=4688} -MaxEvents 200`},
    {t:"Utente aggiunto a un gruppo protetto (Event ID 4732): tecnica di escalation privilegi molto comune, spesso associata all'aggiunta al gruppo Administrators.", y:"PowerShell", c:`Get-WinEvent -LogName Security | Where-Object { $_.Id -eq 4732 }`},
    {t:"Fallimenti di pre-autenticazione Kerberos (Event ID 4771): utile per individuare tentativi di brute force o Kerberoasting contro account di dominio.", y:"PowerShell", c:`Get-WinEvent -LogName Security | Where-Object { $_.Id -eq 4771 }`},
    {t:"Eventi di autenticazione NTLM (Event ID 4776): un uso anomalo di NTLM invece di Kerberos può indicare un tentativo di pass-the-hash.", y:"PowerShell", c:`Get-WinEvent -LogName Security | Where-Object { $_.Id -eq 4776 }`},
    {t:"Elenco di tutti i log disponibili sul sistema: utile per capire rapidamente cosa viene effettivamente registrato prima di perdere tempo su query su log non abilitati.", y:"CMD", c:`wevtutil el`},
    {t:"Esporta gli eventi di logon/creazione utenti del log Security in CSV in C:\\Windows\\Temp con timestamp automatico: il file viene riconosciuto dal modulo Parsing di questa dashboard e mostrato come tabella filtrabile e ordinabile.", y:"PowerShell", c:`Get-WinEvent -LogName Security -MaxEvents 500 | Where-Object { $_.Id -in 4624,4625,4672,4720 } | Select-Object TimeCreated,Id,LevelDisplayName,Message | Export-Csv -NoTypeInformation -Path "C:\\Windows\\Temp\\ircheatsheet_eventlog_$(Get-Date -Format 'yyyyMMdd_HHmmss').csv"`},
  ], remediation:[
    {t:"Copia i log critici in un file .evtx prima di procedere con qualsiasi azione di remediation, per preservarne l'integrità.", y:"CMD", c:`wevtutil epl Security C:\\Windows\\Temp\\evidence_security_$(Get-Date -Format 'yyyyMMdd_HHmmss').evtx`},
  ]},

linux: [

    {t:"File con bit SUID o SGID più recenti di /etc/passwd: molto probabilmente backdoor piantate dopo la compromissione iniziale.", y:"Bash", c:`find / -perm /6000 -type f -newer /etc/passwd -exec ls -la {} \\; 2>/dev/null`},
    {t:"Verifica il bit SUID sui binari più comunemente abusati per l'escalation privilegi (GTFOBins).", y:"Bash", c:`ls -la /bin/bash /bin/sh /usr/bin/find /usr/bin/vim /usr/bin/python3 2>/dev/null | grep rws`},
    {t:"File con Linux capabilities assegnate (es. cap_setuid): vettore di escalation privilegi alternativo al bit SUID, spesso trascurato in analisi manuali.", y:"Bash", c:`getcap -r / 2>/dev/null`},

  { id:'overlay', name:'Overlay Mounts', theory:{

    notes:[

    ],
  }, items:[
    {t:"Elenco di tutti i mount overlay attivi sul sistema.", y:"Bash", c:`findmnt | grep overlay`},
    {t:"Stessa informazione letta direttamente da /proc/mounts.", y:"Bash", c:`cat /proc/mounts | grep overlay`},
    {t:"Mount overlay non riconducibili a Docker/containerd: potenziale overlay malevolo mascherato da containerizzazione legittima.", y:"Bash", c:`findmnt -t overlay -o TARGET,OPTIONS | grep -vE "docker|containerd|run"`},
    {t:"Overlay montati sopra percorsi di sistema critici come /bin, /usr/bin, /lib, /etc, /sbin.", y:"Bash", c:`for p in /bin /usr/bin /lib /etc /sbin; do findmnt "$p" | grep overlay && echo "ATTENZIONE: $p"; done`},
    {t:"File whiteout, usati da OverlayFS per nascondere i file originali sottostanti.", y:"Bash", c:`find / -name ".wh.*" 2>/dev/null`},
    {t:"Mount overlay configurati per essere persistenti al riavvio tramite fstab.", y:"Bash", c:`grep overlay /etc/fstab`},
    {t:"Confronta l'hash di un binario critico con l'eventuale versione presente nella upperdir sospetta.", y:"Bash", c:`sha256sum /usr/bin/sudo\nsha256sum /tmp/.x/usr/bin/sudo 2>/dev/null`},
  ], remediation:[
    {t:"Smonta l'overlay più esterno sul percorso interessato, ripristinando la visibilità dei file originali.", y:"Bash", c:`umount /usr/bin   # adattare al percorso interessato`},
    {t:"Se gli overlay sono impilati, ripete lo smontaggio finché il percorso risulta pulito.", y:"Bash", c:`while findmnt /var/log | grep -q overlay; do umount /var/log; done`},
    {t:"Rimuove la voce fstab che rende l'overlay persistente al riavvio.", y:"Bash", c:`sed -i '/overlay.*upperdir=\\/tmp/d' /etc/fstab`},
    {t:"Elimina la upperdir malevola dopo averla salvata come evidenza.", y:"Bash", c:`rm -rf /tmp/.x/`},
    {t:"Termina i processi che hanno ancora mappato in memoria il binario malevolo dell'overlay.", y:"Bash", c:`lsof | grep "overlay\\|/tmp/.x"\nkill -9 <PID>`},
    {t:"Verifica che il binario originale sia di nuovo visibile e coerente con il pacchetto di sistema.", y:"Bash", c:`sha256sum /usr/bin/sudo && dpkg --verify sudo`},
  ]},

/* =========================================================
   STATO & UTILITY
   ========================================================= */
const state = { area:null };
const $ = (sel,el=document)=>el.querySelector(sel);
const $$ = (sel,el=document)=>Array.from(el.querySelectorAll(sel));

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

/* Evidenzia i segnaposto variabili (es. <PID>, <host>) con un colore dedicato.
   Il comando viene prima interamente escapato, poi solo i token <...> vengono
   racchiusi in uno span colorato: il testo copiato negli appunti resta invariato. */
function renderCommand(raw){
  const escaped = escapeHtml(raw);
  return escaped.replace(/&lt;([^&]+?)&gt;/g, '<span class="placeholder">&lt;$1&gt;</span>');
}

function truncate(str, n){
  return str.length > n ? str.slice(0, n - 1) + '…' : str;
}

/* =========================================================
   TEMA
   ========================================================= */
function initTheme(){
  let saved = null;
  try{ saved = localStorage.getItem('ir-cheatsheet-theme'); }catch(e){}
  const theme = saved === 'light' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  $('#themeToggle').textContent = theme === 'dark' ? '◐' : '◑';
}
$('#themeToggle').addEventListener('click', ()=>{
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  $('#themeToggle').textContent = next === 'dark' ? '◐' : '◑';
  try{ localStorage.setItem('ir-cheatsheet-theme', next); }catch(e){}
});

/* =========================================================
   CHECKLIST ESECUZIONE & OUTPUT INCOLLATO (persistiti)
   ========================================================= */
function loadState(key){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
const execState = loadState('ir-cheatsheet-exec');
const outputState = loadState('ir-cheatsheet-output');

function saveExecState(){ try{ localStorage.setItem('ir-cheatsheet-exec', JSON.stringify(execState)); }catch(e){} }
function saveOutputState(){ try{ localStorage.setItem('ir-cheatsheet-output', JSON.stringify(outputState)); }catch(e){} }

document.addEventListener('change', (e)=>{
  const chk = e.target.closest('.exec-check');
  if (!chk) return;
  const id = chk.dataset.id;
  execState[id] = chk.checked;
  saveExecState();
  const card = chk.closest('.card');
  if (card) card.classList.toggle('done', chk.checked);
});

document.addEventListener('input', (e)=>{
  const ta = e.target.closest('.output-box');
  if (!ta) return;
  const id = ta.dataset.id;
  outputState[id] = ta.value;
  saveOutputState();
});

/* =========================================================
   RENDER
   ========================================================= */
function renderArea(area){
  state.area = area;
  document.documentElement.setAttribute('data-area', area);

  $$('.area-tab').forEach(b=> b.classList.toggle('active', b.dataset.area === area));
  $('#breadcrumb').textContent = `root@triage:~/${area}#`;

  const catTabsEl = $('#categoryTabs');
  const contentEl = $('#content');
  catTabsEl.innerHTML = '';
  contentEl.innerHTML = '';

  if (area === 'dfir'){
    catTabsEl.style.display = 'none';
    contentEl.innerHTML = `
      <div class="wip">
        <div class="wip-icon">🚧</div>
        <h2>Work in progress</h2>
        <p>La sezione DFIR sarà popolata nei prossimi aggiornamenti.</p>
      </div>`;
    return;
  }
  if (area === 'parsing'){
    catTabsEl.style.display = 'none';
    contentEl.innerHTML = buildParsingView();
    attachParsingHandlers();
    return;
  }
  catTabsEl.style.display = 'flex';

  const cats = DATA[area];
  cats.forEach(cat=>{
    const tab = document.createElement('button');
    tab.className = 'cat-tab';
    tab.dataset.cat = cat.id;
    tab.textContent = cat.name;
    tab.addEventListener('click', ()=>{
      document.getElementById(`sec-${area}-${cat.id}`).scrollIntoView({behavior:'smooth', block:'start'});
    });
    catTabsEl.appendChild(tab);
  });

  cats.forEach(cat=>{
    const section = document.createElement('section');
    section.className = 'section';
    section.id = `sec-${area}-${cat.id}`;

    const head = document.createElement('div');
    head.className = 'section-head';
    const remCount = (cat.remediation && cat.remediation.length) || 0;
    head.innerHTML = `<h2>${escapeHtml(cat.name)}</h2><span class="count">${cat.items.length} comandi${remCount ? ' + ' + remCount + ' remediation' : ''}</span>`;
    section.appendChild(head);

    const hasTheory = cat.theory && ((cat.theory.paths && cat.theory.paths.length) || (cat.theory.notes && cat.theory.notes.length));
    const hasRem = cat.remediation && cat.remediation.length;

    if (!hasTheory && !hasRem){
      /* Layout semplice a colonna singola (retrocompatibile, es. area Windows) */
      const list = document.createElement('div');
      cat.items.forEach((item, idx)=> list.appendChild(buildItemCard(area, cat, item, idx, 'main')));
      section.appendChild(list);
      contentEl.appendChild(section);
      return;
    }

    const cols = document.createElement('div');
    cols.className = 'section-cols';
    const templates = [];

    if (hasTheory){
      templates.push('1fr');
      const theoryCol = document.createElement('div');
      theoryCol.className = 'col-theory';
      theoryCol.innerHTML = `<div class="col-head theory">📖 Teoria</div>`;
      theoryCol.appendChild(buildTheoryCard(cat.theory));
      cols.appendChild(theoryCol);
    }

    templates.push('1fr');
    const detectCol = document.createElement('div');
    detectCol.className = 'col-detect';
    detectCol.innerHTML = `<div class="col-head detect">🔎 Individuazione</div>`;
    cat.items.forEach((item, idx)=> detectCol.appendChild(buildItemCard(area, cat, item, idx, 'main')));
    cols.appendChild(detectCol);

    if (hasRem){
      templates.push('1fr');
      const remCol = document.createElement('div');
      remCol.className = 'col-rem';
      remCol.innerHTML = `<div class="col-head rem">⚠ Remediation</div>`;
      cat.remediation.forEach((item, idx)=> remCol.appendChild(buildItemCard(area, cat, item, idx, 'rem')));
      cols.appendChild(remCol);
    }

    cols.style.gridTemplateColumns = templates.join(' ');
    section.appendChild(cols);
    contentEl.appendChild(section);
  });

  setupScrollSpy(area);
}

/* Costruisce una singola card comando (individuazione o remediation) */
function buildItemCard(area, cat, item, idx, kind){
  const id = kind === 'rem' ? `${area}-${cat.id}-rem-${idx}` : `${area}-${cat.id}-${idx}`;
  const domId = kind === 'rem' ? `item-rem-${area}-${cat.id}-${idx}` : `item-${area}-${cat.id}-${idx}`;
  const card = document.createElement('div');
  card.className = 'card' + (kind === 'rem' ? ' rem-card' : '') + (execState[id] ? ' done' : '');
  card.id = domId;
  card.innerHTML = `
    <div class="card-head">
      <label class="exec-label" title="Segna come eseguito">
        <input type="checkbox" class="exec-check" data-id="${id}" ${execState[id] ? 'checked' : ''}>
      </label>
      ${area === 'linux' ? '' : `<span class="badge ${item.y}">${item.y}</span>`}
      ${kind === 'rem' ? '<span class="badge rem">rem</span>' : ''}
      <div class="card-title" title="${escapeHtml(item.t)}">${escapeHtml(item.t)}</div>
    </div>
    <div class="cmd-row">
      <button class="copy-btn" data-area="${area}" data-cat="${cat.id}" data-idx="${idx}" data-kind="${kind}" title="Copia: incollando il comando in un terminale verrà eseguito automaticamente">
        <span class="copy-icon">⧉</span><span class="copy-label">copia</span>
      </button>
      <pre class="code">${renderCommand(item.c)}</pre>
      <textarea class="output-box" data-id="${id}" placeholder="+ output" title="Clicca per incollare l'output del comando">${escapeHtml(outputState[id] || '')}</textarea>
    </div>
  `;
  return card;
}

/* Costruisce la card di teoria (percorsi + note) a partire da cat.theory */
function buildTheoryCard(theory){
  const card = document.createElement('div');
  card.className = 'theory-card';
  let html = '';
  (theory.paths || []).forEach(p=>{
    html += `<div class="theory-path-row"><div class="theory-path">${escapeHtml(p.p)}</div><div class="theory-desc">${escapeHtml(p.d)}</div></div>`;
  });
  (theory.notes || []).forEach(n=>{
    html += `<div class="theory-note${n.warn ? ' warn' : ''}">${n.warn ? '⚠ ' : ''}${escapeHtml(n.text || n)}</div>`;
  });
  card.innerHTML = html;
  return card;
}

function setupScrollSpy(area){
  const sections = $$('.section');
  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if (entry.isIntersecting){
        const catId = entry.target.id.split('-').slice(2).join('-');
        $$('.cat-tab').forEach(t=> t.classList.toggle('active', t.dataset.cat === catId));
        $('#breadcrumb').textContent = `root@triage:~/${area}/${catId}#`;
      }
    });
  }, { rootMargin: '-150px 0px -70% 0px' });
  sections.forEach(s=> observer.observe(s));
}

   MODULO PARSING: upload file .csv/.txt esportati dai comandi della dashboard
   ========================================================= */
const PARSING_CATEGORIES = {
  sysinfo: 'System Info',
  process: 'Process',
  connection: 'Connection',
  persistence: 'Persistence',
  services: 'Services',
  tasks: 'Task Schedule',
  suspdir: 'Suspicious Directory',
  eventlog: 'Event Logs'
};

function buildParsingView(){
  return `
    <div class="parsing-view">
      <label class="upload-box" for="fileUpload">
        <span class="upload-title">📄 Seleziona un file .csv o .txt da analizzare</span>
        <span class="upload-hint">Carica qui l'output esportato con i comandi "Esporta in CSV/TXT" presenti in ogni sezione (salvati in C:\\Windows\\Temp). I file con nome ircheatsheet_&lt;categoria&gt;_&lt;timestamp&gt; vengono riconosciuti automaticamente. I CSV sono mostrati come tabella filtrabile e ordinabile, i TXT come testo con filtro riga per riga.</span>
        <input type="file" id="fileUpload" accept=".csv,.txt" hidden>
      </label>
      <div id="parsingFileInfo" class="parsing-file-info hidden"></div>
      <div id="parsingOutput"></div>
    </div>
  `;
}

function attachParsingHandlers(){
  const input = document.getElementById('fileUpload');
  if (!input) return;
  input.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const text = String(ev.target.result);
      const name = file.name;
      const ext = name.split('.').pop().toLowerCase();
      const infoEl = document.getElementById('parsingFileInfo');
      const outputEl = document.getElementById('parsingOutput');

      const m = name.match(/^ircheatsheet_([a-z]+)_\d{8}_\d{6}\.(csv|txt)$/i);
      let label = null;
      if (m && PARSING_CATEGORIES[m[1].toLowerCase()]){
        label = PARSING_CATEGORIES[m[1].toLowerCase()];
      }
      infoEl.classList.remove('hidden');
      infoEl.innerHTML = label
        ? `Formato riconosciuto: <span class="tag-known">${escapeHtml(label)}</span> · ${escapeHtml(name)} · ${(file.size/1024).toFixed(1)} KB`
        : `${escapeHtml(name)} · ${(file.size/1024).toFixed(1)} KB`;

      if (ext === 'csv'){
        const { headers, rows } = parseCSV(text);
        outputEl.innerHTML = '<div class="table-wrap"></div>';
        renderTable(headers, rows, outputEl.querySelector('.table-wrap'));
      } else {
        outputEl.innerHTML = '<div class="txt-wrap"></div>';
        renderTxtViewer(text, outputEl.querySelector('.txt-wrap'));
      }
    };
    reader.readAsText(file, 'utf-8');
  });
}

/* Parser CSV conforme a RFC4180 (gestisce campi tra virgolette con virgole/newline interni) */
function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQuotes){
      if (c === '"'){
        if (text[i+1] === '"'){ field += '"'; i++; }
        else { inQuotes = false; }
      } else { field += c; }
    } else {
      if (c === '"'){ inQuotes = true; }
      else if (c === ','){ row.push(field); field = ''; }
      else if (c === '\r'){ /* ignora, gestito su \n */ }
      else if (c === '\n'){ row.push(field); rows.push(row); row = []; field = ''; }
      else { field += c; }
    }
  }
  if (field.length > 0 || row.length > 0){ row.push(field); rows.push(row); }
  const nonEmpty = rows.filter(r => !(r.length === 1 && r[0] === ''));
  const headers = nonEmpty[0] || [];
  const dataRows = nonEmpty.slice(1);
  return { headers, rows: dataRows };
}

function renderTable(headers, rows, container){
  let sortCol = -1, sortAsc = true, filterText = '';

  function draw(){
    const filtered = filterText
      ? rows.filter(r => r.some(cell => (cell || '').toLowerCase().includes(filterText)))
      : rows;
    let sorted = filtered;
    if (sortCol >= 0){
      sorted = [...filtered].sort((a,b)=>{
        const av = a[sortCol] || '', bv = b[sortCol] || '';
        const an = parseFloat(av), bn = parseFloat(bv);
        let cmp;
        if (!isNaN(an) && !isNaN(bn) && av.trim() !== '' && bv.trim() !== ''){ cmp = an - bn; }
        else { cmp = av.localeCompare(bv); }
        return sortAsc ? cmp : -cmp;
      });
    }
    container.innerHTML = `
      <div class="table-toolbar">
        <input type="text" class="table-filter" placeholder="Filtra righe..." value="${escapeHtml(filterText)}">
        <span class="table-count">${sorted.length} / ${rows.length} righe</span>
      </div>
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr>${headers.map((h,i)=>`<th data-col="${i}">${escapeHtml(h)}${sortCol===i ? (sortAsc ? ' ▲' : ' ▼') : ''}</th>`).join('')}</tr></thead>
          <tbody>${sorted.map(r=>`<tr>${headers.map((h,i)=>`<td title="${escapeHtml(r[i]||'')}">${escapeHtml(truncate(r[i]||'', 160))}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>
    `;
    const filterInput = container.querySelector('.table-filter');
    filterInput.addEventListener('input', (e)=>{
      const pos = e.target.selectionStart;
      filterText = e.target.value.toLowerCase();
      draw();
      const newInput = container.querySelector('.table-filter');
      newInput.focus();
      newInput.setSelectionRange(pos, pos);
    });
    container.querySelectorAll('th').forEach(th=>{
      th.addEventListener('click', ()=>{
        const col = parseInt(th.dataset.col, 10);
        if (sortCol === col){ sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
        draw();
      });
    });
  }
  draw();
}

function highlightMatch(escapedLine, needle){
  if (!needle) return escapedLine;
  const lower = escapedLine.toLowerCase();
  let result = '', i = 0;
  while (true){
    const idx = lower.indexOf(needle, i);
    if (idx === -1){ result += escapedLine.slice(i); break; }
    result += escapedLine.slice(i, idx) + '<mark>' + escapedLine.slice(idx, idx + needle.length) + '</mark>';
    i = idx + needle.length;
  }
  return result;
}

function renderTxtViewer(text, container){
  const lines = text.split(/\r\n|\n/);
  let filterText = '';

  function draw(){
    const filtered = filterText
      ? lines.filter(l => l.toLowerCase().includes(filterText))
      : lines;
    container.innerHTML = `
      <div class="table-toolbar">
        <input type="text" class="txt-filter" placeholder="Filtra righe (come un grep)..." value="${escapeHtml(filterText)}">
        <span class="table-count">${filtered.length} / ${lines.length} righe</span>
      </div>
      <pre class="txt-viewer">${filtered.map(l => highlightMatch(escapeHtml(l), filterText)).join('\n')}</pre>
    `;
    const filterInput = container.querySelector('.txt-filter');
    filterInput.addEventListener('input', (e)=>{
      const pos = e.target.selectionStart;
      filterText = e.target.value.toLowerCase();
      draw();
      const newInput = container.querySelector('.txt-filter');
      newInput.focus();
      newInput.setSelectionRange(pos, pos);
    });
  }
  draw();
}

/* copia negli appunti con "paste-to-execute": viene aggiunto un a-capo finale così che,
   incollando il comando in un terminale (cmd/PowerShell/bash), venga anche eseguito. */
document.addEventListener('click', (e)=>{
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const { area, cat, idx, kind } = btn.dataset;
  const catObj = DATA[area].find(c=>c.id===cat);
  const rawCommand = (kind === 'rem' ? catObj.remediation : catObj.items)[idx].c;
  const eol = area === 'windows' ? '\r\n' : '\n';
  const text = rawCommand + eol;

  function markCopied(){
    btn.classList.add('copied');
    const icon = btn.querySelector('.copy-icon');
    const orig = icon.textContent;
    icon.textContent = '✓';
    setTimeout(()=>{ icon.textContent = orig; btn.classList.remove('copied'); }, 1400);
  }

  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(markCopied).catch(()=> fallbackCopy(text, markCopied));
  } else {
    fallbackCopy(text, markCopied);
  }
});

function fallbackCopy(text, cb){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  if (cb) cb();
}

function buildIndex(){
  const idx = [];
  ['windows','linux'].forEach(area=>{
    DATA[area].forEach(cat=>{
      cat.items.forEach((item, i)=>{
        idx.push({ area, catId:cat.id, catName:cat.name, idx:i, title:item.t, type:item.y, command:item.c, kind:'main' });
      });
      (cat.remediation||[]).forEach((item, i)=>{
        idx.push({ area, catId:cat.id, catName:cat.name+' · Remediation', idx:i, title:item.t, type:item.y, command:item.c, kind:'rem' });
      });
    });
  });
  return idx;
}
const SEARCH_INDEX = buildIndex();

const searchInput = $('#searchInput');
const searchResults = $('#searchResults');

searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 3){
    searchResults.classList.add('hidden');
    searchResults.innerHTML = '';
    return;
  }
  const matches = SEARCH_INDEX.filter(e=>
    e.title.toLowerCase().includes(q) ||
    e.command.toLowerCase().includes(q) ||
    e.catName.toLowerCase().includes(q)
  ).slice(0, 30);

  searchResults.innerHTML = '';
  if (matches.length === 0){
    searchResults.innerHTML = `<div class="sr-empty">Nessun comando trovato per "${escapeHtml(searchInput.value)}"</div>`;
  } else {
    matches.forEach(m=>{
      const row = document.createElement('button');
      row.className = 'sr-item';
      row.innerHTML = `
        <div class="sr-title">${escapeHtml(m.title)}</div>
        <div class="sr-meta"><span class="tag">${m.area}</span> · ${escapeHtml(m.catName)} · ${m.type}</div>
      `;
      row.addEventListener('click', ()=> goToResult(m));
      searchResults.appendChild(row);
    });
  }
  searchResults.classList.remove('hidden');
});

document.addEventListener('click', (e)=>{
  if (!e.target.closest('.search-wrap')){
    searchResults.classList.add('hidden');
  }
});

function goToResult(m){
  searchResults.classList.add('hidden');
  searchInput.value = '';
  if (state.area !== m.area){
    renderArea(m.area);
  }
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      const cardId = m.kind === 'rem' ? `item-rem-${m.area}-${m.catId}-${m.idx}` : `item-${m.area}-${m.catId}-${m.idx}`;
      const card = document.getElementById(cardId);
      if (card){
        card.scrollIntoView({behavior:'smooth', block:'center'});
        card.classList.add('flash');
        setTimeout(()=> card.classList.remove('flash'), 1600);
      }
    }, 60);
  });
}

const backToTopBtn = $('#backToTop');
window.addEventListener('scroll', ()=>{
  backToTopBtn.classList.toggle('visible', window.scrollY > 400);
});
backToTopBtn.addEventListener('click', ()=>{
  window.scrollTo({ top:0, behavior:'smooth' });
});

/* =========================================================
   REPORT DI STAMPA: elenca i comandi segnati come eseguiti con il relativo output
   ========================================================= */
function buildReportHTML(){
  const executed = [];
  ['windows','linux'].forEach(area=>{
    DATA[area].forEach(cat=>{
      cat.items.forEach((item, idx)=>{
        const id = `${area}-${cat.id}-${idx}`;
        if (execState[id]){
          executed.push({ area, catName: cat.name, item, output: outputState[id] || '' });
        }
      });
      (cat.remediation||[]).forEach((item, idx)=>{
        const id = `${area}-${cat.id}-rem-${idx}`;
        if (execState[id]){
          executed.push({ area, catName: cat.name+' · Remediation', item, output: outputState[id] || '' });
        }
      });
    });
  });

  if (executed.length === 0){
    return `<div class="report-empty">Nessun comando segnato come eseguito. Spunta la checklist accanto ai comandi da includere nel report prima di stamparlo.</div>`;
  }

  const rows = executed.map(e => `
    <div class="report-item">
      <div class="report-item-head">${escapeHtml(e.area)} · ${escapeHtml(e.catName)} · ${e.item.y}</div>
      <div class="report-title">${escapeHtml(e.item.t)}</div>
      <pre class="report-cmd">${escapeHtml(e.item.c)}</pre>
      <div class="report-output-label">Output:</div>
      <pre class="report-output">${e.output.trim() ? escapeHtml(e.output) : '(nessun output incollato)'}</pre>
    </div>
  `).join('');

  return `
    <h1>IR-Cheatsheet — Report di triage</h1>
    <div class="report-meta">Generato il ${new Date().toLocaleString('it-IT')} · ${executed.length} comandi eseguiti</div>
    ${rows}
  `;
}

$('#reportBtn').addEventListener('click', ()=>{
  $('#printReport').innerHTML = buildReportHTML();
  window.print();
});
